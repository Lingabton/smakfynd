      <h1>Smakfynd — Smartare vinval på Systembolaget</h1>
      <p>Smakfynd rankar 11619 viner från 51 länder efter kvalitet i förhållande till pris.
      Vi kombinerar crowd-betyg från hundratusentals användare med expertrecensioner från vinkritiker
      och jämför priset relativt kategorin. Resultatet: en enda poäng som visar kvalitet per krona.</p>

      <h2>Så fungerar Smakfynd-poängen</h2>
      <p>Varje vin bedöms på tre dimensioner:</p>
      <ul>
        <li><strong>Crowd-betyg</strong> — betyg från hundratusentals vanliga vindrickare</li>
        <li><strong>Expertrecensioner</strong> — poäng från erkända vinkritiker som James Suckling, Decanter och Falstaff</li>
        <li><strong>Prisvärde</strong> — vinets pris jämfört med medianen i sin kategori</li>
      </ul>
      <p>Kvalitet väger 75%, prisvärde 25%. Ekologiska viner får en liten bonus.</p>

      <h2>AI-vinmatchare</h2>
      <p>Beskriv din måltid och få personliga vinförslag baserat på AI-analys matchad mot vår databas.
      Till exempel: "Toast skagen till förrätt, sedan oxfilé med rödvinssky" — och vi föreslår viner
      för varje rätt i olika prisklasser.</p>

// Data: loaded async from wines.json, or embedded at build time as fallback
const DATA_URL = "wines.json";

// Analytics
const ANALYTICS_URL = "https://smakfynd-analytics.smakfynd.workers.dev";
const _sid = (() => {
  try {
    let s = sessionStorage.getItem("sf_sid");
    if (!s) {
      s = Math.random().toString(36).slice(2);
      sessionStorage.setItem("sf_sid", s);
    }
    return s;
  } catch (e) {
    return "anon";
  }
})();
function track(event, data) {
  try {
    const device = window.innerWidth < 768 ? "mobile" : "desktop";
    fetch(ANALYTICS_URL + "/event", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        session: _sid,
        event,
        wine_nr: data?.nr,
        data,
        page: location.hash || "/",
        device,
        referrer: document.referrer
      }),
      keepalive: true
    }).catch(() => {});
  } catch (e) {}
}
function trackSearch(query, count, clickedNr) {
  try {
    fetch(ANALYTICS_URL + "/search", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        session: _sid,
        query,
        results_count: count,
        clicked_nr: clickedNr
      }),
      keepalive: true
    }).catch(() => {});
  } catch (e) {}
}
function trackAI(meal, response, latencyMs) {
  try {
    const wines = (response?.courses || []).flatMap(c => c.wines || []).map(w => w.nr).filter(Boolean).join(",");
    fetch(ANALYTICS_URL + "/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        session: _sid,
        meal,

function useSaved() {
  const [data, setData] = useState(() => {
    try {
      const raw = localStorage.getItem("smakfynd_saved_v2");
      if (raw) return JSON.parse(raw);
      // Migrate from old format (flat array → favoriter list)
      const old = JSON.parse(localStorage.getItem("smakfynd_saved") || "[]");
      if (old.length) {
        const migrated = {};
        old.forEach(nr => {
          migrated[nr] = ["favoriter"];
        });
        return migrated;
      }
      return {};
    } catch (e) {
      return {};
    }
  });
  const save = next => {
    setData(next);
    try {
      localStorage.setItem("smakfynd_saved_v2", JSON.stringify(next));
    } catch (e) {}
  };
  const toggle = (nr, list = "favoriter", auth) => {
    const next = {
      ...data
    };
    const lists = next[nr] || [];
    if (lists.includes(list)) {
      const filtered = lists.filter(l => l !== list);
      if (filtered.length === 0) delete next[nr];else next[nr] = filtered;
      if (auth) auth.removeFromServer(nr, list);
    } else {
      next[nr] = [...lists, list];
      if (auth) auth.saveToServer(nr, list);
    }
    save(next);
  };
  const isSaved = nr => !!(data[nr] && data[nr].length > 0);
  const isInList = (nr, list) => (data[nr] || []).includes(list);
  const getLists = nr => data[nr] || [];
  const allSaved = Object.keys(data).filter(nr => data[nr] && data[nr].length > 0);
  const inList = list => Object.keys(data).filter(nr => (data[nr] || []).includes(list));
  const count = allSaved.length;
  return {
    data,
    toggle,
    isSaved,
    isInList,
    getLists,
    allSaved,
    inList,
    count
  };
}

// Scroll-reveal hook — triggers animation when element enters viewport
function useScrollReveal(threshold = 0.1) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    if (typeof IntersectionObserver === "undefined") {
      setVisible(true);
      return;
    }
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setVisible(true);
        obs.disconnect();
      }
    }, {
      threshold,
      rootMargin: "50px"
    });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

  if (p.price < 100) links.push({

  });
  if (p.organic) links.push({

    label: "Ekologiska viner"
  });
  return links.slice(0, 3);

      },
      body: JSON.stringify({
        token,
        nr,
        list
      }),
      keepalive: true
    }).catch(() => {});
