<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Smakfynd</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f1ea; color: #1a1510; font-size: 13px; }
    .container { max-width: 1000px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 22px; font-family: Georgia, serif; margin-bottom: 2px; }
    h2 { font-size: 15px; font-family: Georgia, serif; font-weight: 400; margin: 20px 0 10px; color: #3d3830; border-bottom: 1px solid #e2d8c8; padding-bottom: 4px; }
    .sub { font-size: 11px; color: #9e9588; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 12px; }
    .stat { background: #fff; border-radius: 10px; border: 1px solid #e2d8c8; padding: 12px; }
    .stat-v { font-size: 24px; font-weight: 700; font-family: Georgia, serif; }
    .stat-l { font-size: 10px; color: #9e9588; margin-top: 1px; }
    .stat-w .stat-v { color: #c44020; }
    .stat-g .stat-v { color: #2d6b3f; }
    .bar-r { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .bar-l { font-size: 10px; color: #6b6355; width: 80px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-t { flex: 1; height: 6px; background: #e8e2d8; border-radius: 3px; overflow: hidden; }
    .bar-f { height: 100%; border-radius: 3px; }
    .bar-v { font-size: 10px; color: #9e9588; width: 35px; flex-shrink: 0; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; font-size: 10px; color: #9e9588; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 6px; border-bottom: 2px solid #e2d8c8; }
    td { padding: 6px; border-bottom: 1px solid #ede6da; }
    .pill { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .p-red { background: #c4402015; color: #c44020; }
    .p-green { background: #2d6b3f15; color: #2d6b3f; }
    .p-yellow { background: #b08d4015; color: #b08d40; }
    .p-blue { background: #6b8cce15; color: #6b8cce; }
    .card { background: #fff; border-radius: 10px; border: 1px solid #e2d8c8; padding: 12px; margin-bottom: 6px; }
    .tabs { display: flex; gap: 3px; margin-bottom: 12px; flex-wrap: wrap; }
    .tabs button { padding: 6px 14px; border-radius: 6px; border: 1px solid #e2d8c8; background: #fff; cursor: pointer; font-size: 11px; font-family: inherit; }
    .tabs button.on { background: #8b2332; color: #fff; border-color: #8b2332; }
    .sec { display: none; }
    .sec.on { display: block; }
    .links { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
    .links a { padding: 6px 12px; border-radius: 6px; font-size: 11px; text-decoration: none; border: 1px solid #e2d8c8; color: #3d3830; background: #fff; }
    .links a:hover { border-color: #8b2332; color: #8b2332; }
    .live { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #2d6b3f; margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .commit { font-family: monospace; font-size: 11px; color: #8b2332; }
    .insight-item { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0ebe3; align-items: center; }
    .insight-item:last-child { border: none; }
    #loading { text-align: center; padding: 40px; color: #9e9588; }
    .flag-card { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .flag-card .info { flex: 1; min-width: 0; }
    .btn { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 10px; font-weight: 600; }
    .btn-g { background: #2d6b3f; color: #fff; }
    .btn-r { background: #c44020; color: #fff; }
    .btn-u { background: #e8e2d8; color: #3d3830; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <h1>Smakfynd Admin</h1>
  <div class="sub" id="gen">Laddar...</div>

  <div class="tabs" id="tabs">
    <button class="on" onclick="tab('ov')">Översikt</button>
    <button onclick="tab('ins')">Insikter</button>
    <button onclick="tab('dq')">Datakvalitet</button>
    <button onclick="tab('viv')">Vivino</button>
    <button onclick="tab('tr')">Trafik <span class="live"></span></button>
    <button onclick="tab('seo')">SEO</button>
    <button onclick="tab('dep')">Deploy</button>
  </div>

  <div id="loading">Laddar...</div>
  <div class="sec on" id="s-ov"></div>
  <div class="sec" id="s-ins"></div>
  <div class="sec" id="s-dq"></div>
  <div class="sec" id="s-viv"></div>
  <div class="sec" id="s-tr"></div>
  <div class="sec" id="s-seo"></div>
  <div class="sec" id="s-dep"></div>
</div>

<script>
const ANALYTICS_URL = "https://smakfynd-analytics.smakfynd.workers.dev";
const SUPABASE_URL = "https://bfzzsniebwxwrnkmeymg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmenpzbmllYnd4d3Jua21leW1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjMzMzgsImV4cCI6MjA5Mjc5OTMzOH0.DxlxqgJ8ANtAaOS95wX1hr6Cd7oEP7l3pJQAy52L778";
let D = null, live = {}, flagD = {};

function tab(id) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  event.target.classList.add('on');
  document.getElementById('s-' + id).classList.add('on');
  if (id === 'tr' && !live.loaded) fetchLive();
}

function bars(data, color, maxVal) {
  if (!maxVal) maxVal = Math.max(...data.map(d => d[1]), 1);
  return data.map(d => `<div class="bar-r"><span class="bar-l">${d[0]}</span><div class="bar-t"><div class="bar-f" style="width:${d[1]/maxVal*100}%;background:${color}"></div></div><span class="bar-v">${d[1]}</span></div>`).join('');
}

async function init() {
  try {
    D = await (await fetch('data.json?v=' + Date.now())).json();
  } catch(e) {
    document.getElementById('loading').textContent = 'Kör: python3 scripts/build_admin.py';
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('gen').textContent = 'Build: ' + new Date(D.generated).toLocaleString('sv-SE');
  renderOv(); renderIns(); renderDq(); renderViv(); renderSeo(); renderDep();
}

function renderOv() {
  const o = D.overview, s = D.scores, p = D.prices, top = D.top_wines;
  const scoreBars = Object.entries(s.distribution).map(([k,v]) => [k+'-'+(+k+9), v]);
  const typeBars = Object.entries(D.types).map(([k,v]) => [k, v]);
  document.getElementById('s-ov').innerHTML = `
    <div class="grid">
      <div class="stat"><div class="stat-v">${o.total_wines.toLocaleString()}</div><div class="stat-l">Viner live</div></div>
      <div class="stat"><div class="stat-v">${o.fast_sortiment}</div><div class="stat-l">Fast sortiment</div></div>
      <div class="stat"><div class="stat-v">${o.price_drops}</div><div class="stat-l">Prissänkta</div></div>
      <div class="stat"><div class="stat-v">${s.avg}</div><div class="stat-l">Snittpoäng</div></div>
      <div class="stat"><div class="stat-v">${p.median} kr</div><div class="stat-l">Medianpris</div></div>
      <div class="stat"><div class="stat-v">${o.snapshots}</div><div class="stat-l">Snapshots</div></div>
    </div>
    <h2>Poängfördelning</h2>${bars(scoreBars, '#8b2332')}
    <h2>Vintyper</h2>${bars(typeBars, '#6b8cce')}
    <h2>Topp 20</h2>
    <table><thead><tr><th>Poäng</th><th>Vin</th><th>Pris</th><th>Land</th></tr></thead><tbody>
    ${top.map(w => `<tr><td style="font-weight:700;font-family:Georgia">${w.score}</td><td><a href="https://smakfynd.se/#vin/${w.nr}" target="_blank" style="color:#8b2332;text-decoration:none"><strong>${w.name}</strong> ${w.sub}</a></td><td>${w.price} kr</td><td>${w.country}</td></tr>`).join('')}
    </tbody></table>`;
}

function renderIns() {
  const ins = D.insights || [];
  let html = '';
  for (const i of ins) {
    const icon = i.type === 'no_image' ? '🖼' : i.type === 'single_source' ? '⚠️' : '🎯';
    html += `<div class="card"><strong>${icon} ${i.title}</strong>`;
    if (i.items.length) {
      html += '<div style="margin-top:8px">';
      for (const item of i.items.slice(0, 10)) {
        const extra = item.source ? `<span class="pill ${item.source === 'crowd' ? 'p-blue' : 'p-yellow'}">${item.source}</span>` : '';
        html += `<div class="insight-item">
          <a href="https://www.systembolaget.se/produkt/vin/${item.nr}" target="_blank" style="color:#8b2332;text-decoration:none;font-weight:600">${item.name}</a>
          ${item.sub ? '<span style="color:#9e9588">'+item.sub+'</span>' : ''}
          <span style="font-weight:700;font-family:Georgia;margin-left:auto">${item.score}</span> ${extra}
        </div>`;
      }
      if (i.items.length > 10) html += `<div style="font-size:11px;color:#9e9588;padding:4px 0">+${i.items.length - 10} fler</div>`;
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('s-ins').innerHTML = html || '<p style="color:#9e9588">Inga insikter</p>';
}

function renderDq() {
  const q = D.data_quality, v = D.vivino;
  let items = Object.entries(q).map(([f, d]) => {
    const cls = d.pct > 50 ? 'p-red' : d.pct > 20 ? 'p-yellow' : 'p-green';
    return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0ebe3"><span>${f}</span><span class="pill ${cls}">${d.pct}% saknas (${d.missing})</span></div>`;
  }).join('');
  const countryBars = Object.entries(D.countries).map(([k,v]) => [k, v]);
  document.getElementById('s-dq').innerHTML = `
    <h2>Saknade fält</h2><div class="card">${items}</div>
    <h2>Datakällor</h2>
    <div class="grid">
      <div class="stat ${v.with_rating > 1000 ? 'stat-g' : 'stat-w'}"><div class="stat-v">${v.with_rating.toLocaleString()}</div><div class="stat-l">Vivino med betyg</div></div>
      <div class="stat"><div class="stat-v">${v.zero_rating.toLocaleString()}</div><div class="stat-l">Vivino utan betyg</div></div>
      <div class="stat"><div class="stat-v">${v.expert_cache.toLocaleString()}</div><div class="stat-l">Expert-cache</div></div>
      <div class="stat ${v.flagged > 0 ? 'stat-w' : 'stat-g'}"><div class="stat-v">${v.flagged}</div><div class="stat-l">Flaggade</div></div>
    </div>
    <h2>Länder (topp 15)</h2>${bars(countryBars, '#6b8cce')}`;
}

function renderViv() {
  const fl = D.flagged_vivino || [];
  if (!fl.length) { document.getElementById('s-viv').innerHTML = '<div class="card" style="text-align:center;color:#2d6b3f">Inga flaggade matchningar</div>'; return; }
  const pending = () => fl.length - Object.keys(flagD).length;
  const render = () => {
    document.getElementById('viv-list').innerHTML = fl.map(f => {
      const st = flagD[f.key] || 'pending';
      const cls = f.match_quality < 60 ? 'p-red' : 'p-yellow';
      return `<div class="card" style="${st!=='pending'?'opacity:0.4':''}"><div class="flag-card"><div class="info">
        <strong>${f.key.split('|')[0]}</strong> <span style="color:#9e9588">${f.key.split('|')[1]||''}</span>
        <div style="color:#6b6355;margin:2px 0">→ ${f.vivino_name}</div>
        <span class="pill ${cls}">${f.match_quality}%</span> Rating: ${f.vivino_rating} · Reviews: ${f.vivino_reviews}
      </div><div>
        ${st==='pending' ? `<button class="btn btn-g" onclick="vDec('${f.key}','ok')">Godkänn</button> <button class="btn btn-r" onclick="vDec('${f.key}','no')">Avvisa</button>` :
        `<button class="btn btn-u" onclick="vDec('${f.key}','undo')">${st==='ok'?'✓':'✗'} Ångra</button>`}
      </div></div></div>`;
    }).join('');
    document.getElementById('viv-status').textContent = `${fl.length} flaggade · ${pending()} kvar`;
  };
  document.getElementById('s-viv').innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span id="viv-status"></span>
    <div><button class="btn btn-g" onclick="vAll('ok')">Godkänn alla</button> <button class="btn btn-r" onclick="vAll('no')">Avvisa alla</button> <button class="btn btn-u" onclick="vExport()">Exportera</button></div>
  </div><div id="viv-list"></div>`;
  render();
  window._vRender = render;
}
function vDec(k, s) { if(s==='undo') delete flagD[k]; else flagD[k]=s; window._vRender(); }
function vAll(s) { (D.flagged_vivino||[]).forEach(f => { if(!flagD[f.key]) flagD[f.key]=s; }); window._vRender(); }
function vExport() {
  const a={}, r={};
  for(const[k,s] of Object.entries(flagD)) {
    const e = (D.flagged_vivino||[]).find(f=>f.key===k);
    if(s==='ok'&&e) a[k]={vivino_rating:e.vivino_rating,vivino_reviews:e.vivino_reviews,vivino_name:e.vivino_name};
    if(s==='no') r[k]=true;
  }
  dl('vivino_approved.json',a); dl('vivino_rejected.json',r);
}
function dl(n,o) { const b=new Blob([JSON.stringify(o,null,2)],{type:'application/json'}), a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=n; a.click(); }

async function fetchLive() {
  live.loaded = true;
  const el = document.getElementById('s-tr');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:#9e9588"><span class="live"></span> Hämtar realtidsdata...</div>';
  try {
    const [stats, searches, aiQ] = await Promise.all([
      fetch(ANALYTICS_URL+'/stats').then(r=>r.json()),
      fetch(ANALYTICS_URL+'/top-searches').then(r=>r.json()),
      fetch(ANALYTICS_URL+'/ai-queries').then(r=>r.json()),
    ]);
    // Try Supabase user count
    let userCount = '–', subCount = '–';
    try {
      const uRes = await fetch(SUPABASE_URL+'/rest/v1/users?select=id', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'count=exact','Range':'0-0'}});
      userCount = uRes.headers.get('content-range')?.split('/')[1] || '–';
      const sRes = await fetch(SUPABASE_URL+'/rest/v1/email_subscribers?select=id', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'count=exact','Range':'0-0'}});
      subCount = sRes.headers.get('content-range')?.split('/')[1] || '–';
    } catch(e) {}

    const topW = (stats.top_wines_7d||[]).slice(0,10);
    const daily = D.analytics?.daily_events || [];
    const history = D.history || [];

    el.innerHTML = `
      <div style="font-size:11px;color:#2d6b3f;margin-bottom:8px"><span class="live"></span> Realtidsdata från CF Workers + Supabase</div>
      <div class="grid">
        <div class="stat"><div class="stat-v">${stats.total_events||0}</div><div class="stat-l">Events totalt</div></div>
        <div class="stat"><div class="stat-v">${stats.total_searches||0}</div><div class="stat-l">Sökningar</div></div>
        <div class="stat"><div class="stat-v">${stats.total_ai_queries||0}</div><div class="stat-l">AI-frågor</div></div>
        <div class="stat stat-g"><div class="stat-v">${userCount}</div><div class="stat-l">Supabase users</div></div>
        <div class="stat"><div class="stat-v">${subCount}</div><div class="stat-l">Prenumeranter</div></div>
      </div>

      <h2>Events per dag</h2>
      ${bars(daily.map(d => [d.day.slice(5), d.n]), '#8b2332')}

      <h2>Topp sökningar (live)</h2>
      <table><thead><tr><th>Sökfras</th><th>Gånger</th></tr></thead><tbody>
      ${searches.slice(0,15).map(s => `<tr><td>${s.query}</td><td>${s.count}</td></tr>`).join('')}
      </tbody></table>

      <h2>AI-frågor (senaste)</h2>
      <table><thead><tr><th>Måltid</th><th>Svar</th><th>Tid</th></tr></thead><tbody>
      ${aiQ.slice(0,10).map(a => `<tr><td>${a.meal}</td><td><span class="pill p-green">${a.mode}</span></td><td>${a.latency_ms?Math.round(a.latency_ms)+'ms':'–'}</td></tr>`).join('')}
      </tbody></table>

      <h2>Populäraste viner (7 dagar)</h2>
      <table><thead><tr><th>Art.nr</th><th>Klick</th><th>SB-klick</th></tr></thead><tbody>
      ${topW.map(w => `<tr><td><a href="https://smakfynd.se/#vin/${w.wine_nr}" target="_blank" style="color:#8b2332">${w.wine_nr}</a></td><td>${w.clicks}</td><td>${w.sb}</td></tr>`).join('')}
      </tbody></table>

      ${history.length > 1 ? `<h2>Historik (${history.length} dagar)</h2>
      <table><thead><tr><th>Datum</th><th>Events</th><th>Idag</th><th>Viner</th><th>Vivino</th><th>Drops</th></tr></thead><tbody>
      ${history.slice().reverse().map(h => `<tr><td>${h.date}</td><td>${h.events}</td><td>${h.today_events||'–'}</td><td>${h.wines}</td><td>${h.vivino_matches||'–'}</td><td>${h.price_drops||'–'}</td></tr>`).join('')}
      </tbody></table>` : ''}

      <h2>Externa dashboards</h2>
      <div class="links">
        <a href="https://smakfynd.goatcounter.com" target="_blank">GoatCounter</a>
        <a href="https://search.google.com/search-console?resource_id=sc-domain:smakfynd.se" target="_blank">Search Console</a>
        <a href="https://supabase.com/dashboard/project/bfzzsniebwxwrnkmeymg" target="_blank">Supabase</a>
        <a href="https://dash.cloudflare.com" target="_blank">Cloudflare</a>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="card" style="color:#c44020">Kunde inte hämta live-data: ${e.message}</div>
    <p style="margin:8px 0;font-size:12px;color:#9e9588">Fallback: build-time data</p>` + renderTrafficFallback();
  }
}

function renderTrafficFallback() {
  const a = D.analytics || {};
  const daily = a.daily_events || [];
  return `<h2>Events per dag (build-time)</h2>${bars(daily.map(d => [d.day.slice(5), d.n]), '#8b2332')}`;
}

function renderSeo() {
  const g = D.gsc || {};
  if (!g.daily?.length) { document.getElementById('s-seo').innerHTML = '<div class="card" style="color:#9e9588">Ingen GSC-data. Exportera från Google Search Console.</div>'; return; }
  const t = g.totals || {};
  document.getElementById('s-seo').innerHTML = `
    <div style="font-size:11px;color:#9e9588;margin-bottom:8px">Period: ${g.period} · Export ${g.exported}</div>
    <div class="grid">
      <div class="stat stat-g"><div class="stat-v">${t.clicks}</div><div class="stat-l">Klick</div></div>
      <div class="stat"><div class="stat-v">${(t.impressions||0).toLocaleString()}</div><div class="stat-l">Impressions</div></div>
      <div class="stat"><div class="stat-v">${t.clicks&&t.impressions?(t.clicks/t.impressions*100).toFixed(1)+'%':'–'}</div><div class="stat-l">CTR</div></div>
      <div class="stat"><div class="stat-v">${t.avg_position}</div><div class="stat-l">Snittposition</div></div>
    </div>
    <h2>Klick per dag</h2>${bars(g.daily.map(d => [d.date.slice(5), d.clicks]), '#8b2332')}
    <h2>Impressions per dag</h2>${bars(g.daily.map(d => [d.date.slice(5), d.impressions]), '#6b8cce')}
    <h2>Enheter</h2>${bars(Object.entries(g.devices||{}).map(([k,v]) => [k, v.clicks]), '#2d6b3f')}
    <h2>Topp sökord</h2>
    <table><thead><tr><th>Sökfras</th><th>Klick</th><th>Impr</th><th>CTR</th><th>Pos</th></tr></thead><tbody>
    ${(g.queries||[]).slice(0,20).map(q => `<tr><td>${q.query}</td><td><strong>${q.clicks}</strong></td><td>${q.impressions}</td><td>${q.ctr}</td><td>${q.position}</td></tr>`).join('')}
    </tbody></table>
    <h2>Topp sidor</h2>
    <table><thead><tr><th>Sida</th><th>Klick</th><th>Impr</th><th>CTR</th><th>Pos</th></tr></thead><tbody>
    ${(g.pages||[]).map(p => `<tr><td><a href="https://smakfynd.se${p.page}" target="_blank" style="color:#8b2332">${p.page||'/'}</a></td><td><strong>${p.clicks}</strong></td><td>${p.impressions}</td><td>${p.ctr}</td><td>${p.position}</td></tr>`).join('')}
    </tbody></table>
    <div class="links"><a href="https://search.google.com/search-console?resource_id=sc-domain:smakfynd.se" target="_blank">Öppna Search Console →</a></div>`;
}

function renderDep() {
  const log = D.git_log || [];
  document.getElementById('s-dep').innerHTML = `
    <h2>Senaste commits</h2>
    <table><thead><tr><th>Hash</th><th>Meddelande</th><th>Datum</th></tr></thead><tbody>
