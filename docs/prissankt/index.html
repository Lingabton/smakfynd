function getScoreInfo(s) {
  if (s >= 90) return ["Fantastiskt fynd", "#b45309", "🏆"];
  if (s >= 75) return ["Utmärkt värde", "#16a34a", "⭐"];
  if (s >= 60) return ["Bra fynd", "#2563eb", ""];
  if (s >= 40) return ["Godkänt", "#6b7280", ""];
  return ["Medel", "#9ca3af", ""];
}

function getImageUrl(p) {
  if (p.image_url) return p.image_url;
  return null;
}

function ProductImage({ p, size = 52 }) {
  const [err, setErr] = React.useState(false);
  const url = getImageUrl(p);
  const icon = ({ Rött: "🍷", Vitt: "🥂", Rosé: "🌸", Mousserande: "🍾" })[p.type] || "🍷";
  if (!url || err) {
    return (
      <div style={{ width: size, height: size, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.5, background: "#faf7f2", borderRadius: 8 }}>
        {icon}
      </div>
    );
  }
  return <img src={url} alt={p.name} style={{ width: size, height: size, objectFit: "contain", borderRadius: 8 }} onError={() => setErr(true)} />;
}

function Prissankt() {
  const [sort, setSort] = useState("drop");
  const [filter, setFilter] = useState("all");

  const wines = useMemo(() => {
    let w = [...PRICE_DROPS];
    if (filter !== "all") w = w.filter(p => p.type === filter);
    if (sort === "drop") w.sort((a, b) => b.drop_pct - a.drop_pct);
    else if (sort === "score") w.sort((a, b) => (b.score || 0) - (a.score || 0));
    else if (sort === "price") w.sort((a, b) => a.price - b.price);
    return w;
  }, [sort, filter]);

  const types = useMemo(() => {
    const t = new Set(PRICE_DROPS.map(p => p.type));
    return ["all", ...Array.from(t)];
  }, []);

  const typeLabels = { all: "Alla", Rött: "Rött", Vitt: "Vitt", Rosé: "Rosé", Mousserande: "Bubbel" };
  const typeIcons = { all: "✦", Rött: "🍷", Vitt: "🥂", Rosé: "🌸", Mousserande: "🍾" };

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 16px", fontFamily: "'Georgia', 'Times New Roman', serif", background: "#fdfcfa", minHeight: "100vh" }}>
      
      {/* Header */}
      <div style={{ padding: "28px 0 8px", borderBottom: "1px solid #e8e0d4" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>

            <a href="https://smakfynd.se" style={{ textDecoration: "none", color: "#78350f", fontSize: 13, fontFamily: "system-ui, sans-serif", letterSpacing: "0.05em" }}>
              ← Tillbaka till Smakfynd
            </a>
            <h1 style={{ margin: "8px 0 4px", fontSize: 28, color: "#1a1a1a", letterSpacing: "-0.02em" }}>
              🏷️ Prissänkta viner
            </h1>
            <p style={{ margin: 0, color: "#78716c", fontSize: 14, fontFamily: "system-ui, sans-serif" }}>
              Viner som sänkts i pris på Systembolaget — med Smakfynd-poäng
            </p>
          </div>
        </div>
      </div>

      {/* Stats banner */}
      <div style={{ margin: "16px 0", padding: "14px 18px", background: "linear-gradient(135deg, #fef3c7, #fde68a)", borderRadius: 12, display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 28 }}>📉</span>
        <div>
          <div style={{ fontFamily: "system-ui, sans-serif", fontWeight: 700, fontSize: 15, color: "#78350f" }}>
            {PRICE_DROPS.length} prissänkta viner just nu
          </div>
          <div style={{ fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#92400e", marginTop: 2 }}>
            Uppdateras löpande · Snittrabatt {PRICE_DROPS.length > 0 ? Math.round(PRICE_DROPS.reduce((a, b) => a + b.drop_pct, 0) / PRICE_DROPS.length) : 0}%
          </div>
        </div>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", margin: "12px 0" }}>
        {types.map(t => (
          <button key={t} onClick={() => setFilter(t)} style={{
            padding: "6px 14px", borderRadius: 20, border: "1px solid " + (filter === t ? "#78350f" : "#d6d3d1"),
            background: filter === t ? "#78350f" : "white", color: filter === t ? "white" : "#57534e",
            fontFamily: "system-ui, sans-serif", fontSize: 13, cursor: "pointer", fontWeight: filter === t ? 600 : 400
          }}>
            {typeIcons[t]} {typeLabels[t] || t}
          </button>
        ))}
      </div>

      {/* Sort */}
      <div style={{ display: "flex", gap: 6, margin: "8px 0 16px", fontFamily: "system-ui, sans-serif", fontSize: 12, color: "#78716c" }}>
        Sortera:
        {[["drop", "Störst rabatt"], ["score", "Högst poäng"], ["price", "Lägst pris"]].map(([k, l]) => (
          <button key={k} onClick={() => setSort(k)} style={{
            padding: "3px 10px", borderRadius: 12, border: "none",
            background: sort === k ? "#292524" : "#f5f5f4", color: sort === k ? "white" : "#57534e",
            fontSize: 12, cursor: "pointer", fontWeight: sort === k ? 600 : 400
          }}>
            {l}
          </button>
        ))}
      </div>

      {/* Wine list */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingBottom: 40 }}>
        {wines.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "#a8a29e", fontFamily: "system-ui, sans-serif" }}>
            Inga prissänkta viner i denna kategori
          </div>
        )}
        {wines.map((w, i) => {
          const s100 = Math.round(Math.min(99, Math.max(1, w.score_100 || 50)));
          const [label, col] = getScoreInfo(s100);
          const sbUrl = `https://www.systembolaget.se/produkt/${w.nr}`;
          
          return (
            <div key={w.nr} style={{ background: "white", borderRadius: 14, padding: "14px 16px", border: "1px solid #e8e0d4", position: "relative" }}>
              
              {/* Drop badge */}
              <div style={{
                position: "absolute", top: -8, right: 12, background: "#dc2626", color: "white",
                padding: "3px 10px", borderRadius: 12, fontSize: 13, fontWeight: 700,
                fontFamily: "system-ui, sans-serif", boxShadow: "0 2px 6px rgba(220,38,38,0.3)"
              }}>
                −{w.drop_pct}%
              </div>

              <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                <ProductImage p={w} size={56} />
                
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 15, color: "#1a1a1a", lineHeight: 1.3 }}>
                    {w.name}

                  <div style={{ fontSize: 13, color: "#78716c", marginTop: 2 }}>
                    {w.sub ? w.sub + " · " : ""}{w.country}
                  </div>
                  {w.grape && (
                    <div style={{ fontSize: 12, color: "#a8a29e", marginTop: 2 }}>

                  )}

                  {/* Prices */}
                  <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginTop: 8 }}>

                      {Math.round(w.price)} kr
                    </span>
                    <span style={{ fontSize: 14, color: "#a8a29e", textDecoration: "line-through", fontFamily: "system-ui, sans-serif" }}>
                      {w.price_old} kr
                    </span>
                    <span style={{ fontSize: 12, color: "#16a34a", fontWeight: 600, fontFamily: "system-ui, sans-serif" }}>
                      Spara {w.price_old - Math.round(w.price)} kr
                    </span>
                  </div>

                  {/* Score bar */}
                  {w.score_100 && (
                    <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 6, background: "#f0ebe4", borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: s100 + "%", height: "100%", borderRadius: 3, background: `linear-gradient(90deg, ${col}44, ${col})` }} />
                      </div>
                      <span style={{ fontSize: 14, fontWeight: 700, color: col, fontFamily: "system-ui, sans-serif", minWidth: 28 }}>
                        {s100}
                      </span>
                    </div>
                  )}

                  {/* Score label + rating */}
                  <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    {w.score_100 && (
                      <span style={{ fontSize: 11, fontWeight: 600, color: col, fontFamily: "system-ui, sans-serif", textTransform: "uppercase", letterSpacing: "0.03em" }}>
                        {label}
                      </span>
                    )}
                    {w.rating > 0 && (
                      <span style={{ fontSize: 12, color: "#78716c", fontFamily: "system-ui, sans-serif" }}>
                        {"★".repeat(Math.round(w.rating))} {w.rating} ({w.reviews > 1000 ? Math.round(w.reviews/1000) + "k" : w.reviews})
                      </span>
                    )}
                  </div>

                  {/* Buy button */}
                  <a href={sbUrl} target="_blank" rel="noopener" style={{
                    display: "inline-block", marginTop: 10, padding: "8px 18px", borderRadius: 8,
                    background: "#292524", color: "white", textDecoration: "none",
                    fontFamily: "system-ui, sans-serif", fontSize: 13, fontWeight: 600
                  }}>
                    Köp på Systembolaget ↗
                  </a>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{ borderTop: "1px solid #e8e0d4", padding: "20px 0 32px", textAlign: "center" }}>
        <a href="https://smakfynd.se" style={{ color: "#78350f", textDecoration: "none", fontFamily: "system-ui, sans-serif", fontSize: 14, fontWeight: 600 }}>
          🍷 Smakfynd — Smartare vinval på Systembolaget
        </a>
        <div style={{ fontSize: 11, color: "#a8a29e", marginTop: 6, fontFamily: "system-ui, sans-serif" }}>
          Prissänkningar baserade på historisk prisdata · Olav Innovation AB
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Prissankt />);
  </script>
