name: Validate & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Babel
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build app (concat src → JSX)
        run: python3 scripts/build_app.py

      - name: Transpile JSX → JS
        run: npx babel --presets @babel/preset-react scripts/smakfynd-v7.jsx -o /tmp/test.js

      - name: Run scoring tests
        run: node tests/test_scoring.js

      - name: Validate wines.json
        run: |
          if [ -f docs/wines.json ]; then
            SIZE=$(wc -c < docs/wines.json)
            if [ "$SIZE" -lt 100 ]; then
              echo "wines.json is empty or too small ($SIZE bytes) — skipping validation"
            else
              node tests/test_data.js
            fi
          else
            echo "No wines.json — skipping"
          fi
